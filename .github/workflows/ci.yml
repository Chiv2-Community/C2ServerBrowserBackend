name: CI

on: [push]

jobs:
  server_ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install Dependencies
        run: uv sync

      - name: Test with pytest
        run: ./ci.sh
